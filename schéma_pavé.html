<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Schéma antivol UCA21</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; padding: 20px; }
  svg { max-width: 800px; width: 100%; }
</style>
</head>
<body>
<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg">

  <rect width="800" height="560" fill="white"/>
  <text x="400" y="26" text-anchor="middle" fill="#111" font-size="13" font-weight="bold" font-family="Arial">Schéma câblage — Antivol UCA21</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CARTE UCA21                               -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="30" y="45" width="120" height="470" rx="6" fill="#f0f4ff" stroke="#333" stroke-width="2"/>
  <text x="90" y="65" text-anchor="middle" fill="#333" font-size="11" font-weight="bold" font-family="Arial">UCA21</text>

  <!-- Broche D9 (buzzer) -->
  <line x1="150" y1="110" x2="170" y2="110" stroke="#333" stroke-width="2"/>
  <text x="147" y="114" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D9</text>

  <!-- Broche GND buzzer -->
  <line x1="150" y1="150" x2="170" y2="150" stroke="#333" stroke-width="2"/>
  <text x="147" y="154" text-anchor="end" fill="#333" font-size="10" font-family="Arial">GND</text>

  <!-- Broche D2 bouton -->
  <line x1="150" y1="210" x2="170" y2="210" stroke="#333" stroke-width="2"/>
  <text x="147" y="214" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D2</text>

  <!-- Broche GND bouton -->
  <line x1="150" y1="250" x2="170" y2="250" stroke="#333" stroke-width="2"/>
  <text x="147" y="254" text-anchor="end" fill="#333" font-size="10" font-family="Arial">GND</text>

  <!-- Broches pavé numérique : R1-R4 (lignes) -->
  <line x1="150" y1="320" x2="170" y2="320" stroke="#333" stroke-width="2"/>
  <text x="147" y="324" text-anchor="end" fill="#333" font-size="10" font-family="Arial">A0</text>

  <line x1="150" y1="345" x2="170" y2="345" stroke="#333" stroke-width="2"/>
  <text x="147" y="349" text-anchor="end" fill="#333" font-size="10" font-family="Arial">A1</text>

  <line x1="150" y1="370" x2="170" y2="370" stroke="#333" stroke-width="2"/>
  <text x="147" y="374" text-anchor="end" fill="#333" font-size="10" font-family="Arial">A2</text>

  <line x1="150" y1="395" x2="170" y2="395" stroke="#333" stroke-width="2"/>
  <text x="147" y="399" text-anchor="end" fill="#333" font-size="10" font-family="Arial">A3</text>

  <!-- Broches pavé numérique : C1-C4 (colonnes) -->
  <line x1="150" y1="430" x2="170" y2="430" stroke="#333" stroke-width="2"/>
  <text x="147" y="434" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D4</text>

  <line x1="150" y1="455" x2="170" y2="455" stroke="#333" stroke-width="2"/>
  <text x="147" y="459" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D5</text>

  <line x1="150" y1="480" x2="170" y2="480" stroke="#333" stroke-width="2"/>
  <text x="147" y="484" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D7</text>

  <line x1="150" y1="505" x2="170" y2="505" stroke="#333" stroke-width="2"/>
  <text x="147" y="509" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D8</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- BUZZER                                    -->
  <!-- ══════════════════════════════════════════ -->

  <!-- fil D9 → buzzer + -->
  <line x1="170" y1="110" x2="310" y2="110" stroke="#333" stroke-width="2"/>
  <text x="240" y="102" text-anchor="middle" fill="#333" font-size="9" font-family="Arial">fil rouge (+)</text>

  <!-- rail GND buzzer -->
  <line x1="170" y1="150" x2="170" y2="185" stroke="#333" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="170" y1="185" x2="420" y2="185" stroke="#333" stroke-width="2"/>
  <!-- symbole GND -->
  <line x1="295" y1="185" x2="295" y2="198" stroke="#333" stroke-width="2"/>
  <line x1="284" y1="198" x2="306" y2="198" stroke="#333" stroke-width="2"/>
  <line x1="288" y1="204" x2="302" y2="204" stroke="#333" stroke-width="1.5"/>
  <line x1="292" y1="210" x2="298" y2="210" stroke="#333" stroke-width="1"/>
  <text x="295" y="222" text-anchor="middle" fill="#333" font-size="9" font-family="Arial">GND</text>

  <!-- buzzer cercle -->
  <circle cx="375" cy="130" r="38" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="358" y1="120" x2="392" y2="120" stroke="#333" stroke-width="2"/>
  <line x1="358" y1="130" x2="392" y2="130" stroke="#333" stroke-width="2"/>
  <line x1="358" y1="140" x2="392" y2="140" stroke="#333" stroke-width="2"/>
  <path d="M400 118 Q411 130 400 142" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M406 112 Q421 130 406 148" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- fil + -->
  <line x1="310" y1="110" x2="310" y2="130" stroke="#333" stroke-width="2"/>
  <line x1="310" y1="130" x2="337" y2="130" stroke="#333" stroke-width="2"/>
  <text x="320" y="118" fill="#333" font-size="11" font-weight="bold" font-family="Arial">+</text>
  <!-- fil − -->
  <line x1="413" y1="130" x2="420" y2="130" stroke="#333" stroke-width="2"/>
  <line x1="420" y1="130" x2="420" y2="185" stroke="#333" stroke-width="2"/>
  <circle cx="420" cy="185" r="4" fill="#333"/>
  <text x="424" y="118" fill="#333" font-size="11" font-weight="bold" font-family="Arial">−</text>
  <text x="375" y="178" text-anchor="middle" fill="#333" font-size="10" font-weight="bold" font-family="Arial">BUZZER</text>
  <text x="375" y="190" text-anchor="middle" fill="#555" font-size="9" font-family="Arial">TMB12A05</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- BOUTON                                    -->
  <!-- ══════════════════════════════════════════ -->
  <!-- fil D2 → bouton -->
  <line x1="170" y1="210" x2="295" y2="210" stroke="#333" stroke-width="2"/>
  <!-- borne gauche -->
  <circle cx="295" cy="210" r="3.5" fill="none" stroke="#333" stroke-width="2"/>
  <!-- levier -->
  <line x1="298" y1="208" x2="338" y2="196" stroke="#333" stroke-width="2"/>
  <!-- borne droite -->
  <circle cx="341" cy="210" r="3.5" fill="none" stroke="#333" stroke-width="2"/>
  <!-- fil → GND -->
  <line x1="344" y1="210" x2="380" y2="210" stroke="#333" stroke-width="2"/>
  <line x1="380" y1="210" x2="380" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="250" x2="380" y2="250" stroke="#333" stroke-width="2"/>
  <!-- symbole GND -->
  <line x1="270" y1="250" x2="270" y2="262" stroke="#333" stroke-width="2"/>
  <line x1="259" y1="262" x2="281" y2="262" stroke="#333" stroke-width="2"/>
  <line x1="263" y1="268" x2="277" y2="268" stroke="#333" stroke-width="1.5"/>
  <line x1="267" y1="274" x2="273" y2="274" stroke="#333" stroke-width="1"/>
  <text x="270" y="286" text-anchor="middle" fill="#333" font-size="9" font-family="Arial">GND</text>
  <!-- label -->
  <text x="318" y="228" text-anchor="middle" fill="#333" font-size="10" font-weight="bold" font-family="Arial">BT0</text>
  <text x="318" y="240" text-anchor="middle" fill="#555" font-size="9" font-family="Arial">D2 · INPUT_PULLUP</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- PAVÉ NUMÉRIQUE 4x4                        -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="530" y="290" width="220" height="240" rx="8" fill="#f9f9f9" stroke="#333" stroke-width="2"/>
  <text x="640" y="312" text-anchor="middle" fill="#333" font-size="11" font-weight="bold" font-family="Arial">Pavé numérique 4×4</text>

  <!-- touches -->
  <!-- rangée 1 -->
  <rect x="548" y="322" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="565" y="340" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">1</text>
  <rect x="590" y="322" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="607" y="340" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">2</text>
  <rect x="632" y="322" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="649" y="340" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">3</text>
  <rect x="674" y="322" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="691" y="340" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">A</text>
  <!-- rangée 2 -->
  <rect x="548" y="356" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="565" y="374" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">4</text>
  <rect x="590" y="356" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="607" y="374" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">5</text>
  <rect x="632" y="356" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="649" y="374" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">6</text>
  <rect x="674" y="356" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="691" y="374" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">B</text>
  <!-- rangée 3 -->
  <rect x="548" y="390" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="565" y="408" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">7</text>
  <rect x="590" y="390" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="607" y="408" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">8</text>
  <rect x="632" y="390" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="649" y="408" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">9</text>
  <rect x="674" y="390" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="691" y="408" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">C</text>
  <!-- rangée 4 -->
  <rect x="548" y="424" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="565" y="442" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">*</text>
  <rect x="590" y="424" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="607" y="442" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">0</text>
  <rect x="632" y="424" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="649" y="442" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">#</text>
  <rect x="674" y="424" width="34" height="26" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="691" y="442" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">D</text>

  <!-- Connecteur pavé (8 fils sortant à gauche) -->
  <!-- Lignes R1-R4 -->
  <line x1="530" y1="320" x2="540" y2="320" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="324" text-anchor="end" fill="#333" font-size="9" font-family="Arial">R1</text>
  <line x1="530" y1="345" x2="540" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="349" text-anchor="end" fill="#333" font-size="9" font-family="Arial">R2</text>
  <line x1="530" y1="370" x2="540" y2="370" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="374" text-anchor="end" fill="#333" font-size="9" font-family="Arial">R3</text>
  <line x1="530" y1="395" x2="540" y2="395" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="399" text-anchor="end" fill="#333" font-size="9" font-family="Arial">R4</text>
  <!-- Colonnes C1-C4 -->
  <line x1="530" y1="425" x2="540" y2="425" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="429" text-anchor="end" fill="#333" font-size="9" font-family="Arial">C1</text>
  <line x1="530" y1="445" x2="540" y2="445" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="449" text-anchor="end" fill="#333" font-size="9" font-family="Arial">C2</text>
  <line x1="530" y1="465" x2="540" y2="465" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="469" text-anchor="end" fill="#333" font-size="9" font-family="Arial">C3</text>
  <line x1="530" y1="485" x2="540" y2="485" stroke="#333" stroke-width="1.5"/>
  <text x="528" y="489" text-anchor="end" fill="#333" font-size="9" font-family="Arial">C4</text>

  <!-- ══ FILS carte → pavé ══ -->
  <!-- Lignes -->
  <line x1="170" y1="320" x2="530" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="345" x2="530" y2="345" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="370" x2="530" y2="370" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="395" x2="530" y2="395" stroke="#333" stroke-width="1.5"/>
  <!-- Colonnes -->
  <line x1="170" y1="430" x2="530" y2="425" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="455" x2="530" y2="445" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="480" x2="530" y2="465" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="505" x2="530" y2="485" stroke="#333" stroke-width="1.5"/>

  <!-- label groupe lignes -->
  <rect x="310" y="306" width="80" height="14" rx="2" fill="#fff" stroke="none"/>
  <text x="350" y="317" text-anchor="middle" fill="#555" font-size="9" font-family="Arial">── Lignes ──</text>
  <rect x="310" y="415" width="80" height="14" rx="2" fill="#fff" stroke="none"/>
  <text x="350" y="426" text-anchor="middle" fill="#555" font-size="9" font-family="Arial">── Colonnes ──</text>

</svg>
</body>
</html>
