<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Schéma antivol UCA21</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; padding: 20px; }
  svg { max-width: 600px; width: 100%; }
</style>
</head>
<body>
<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">

  <rect width="600" height="400" fill="white"/>
  <text x="300" y="28" text-anchor="middle" fill="#111" font-size="13" font-weight="bold" font-family="Arial">Schéma câblage — Antivol UCA21</text>

  <!-- ══════ CARTE UCA21 ══════ -->
  <rect x="40" y="55" width="110" height="300" rx="6" fill="#f0f4ff" stroke="#333" stroke-width="2"/>
  <text x="95" y="76" text-anchor="middle" fill="#333" font-size="11" font-weight="bold" font-family="Arial">UCA21</text>

  <!-- Broches -->
  <line x1="150" y1="120" x2="170" y2="120" stroke="#333" stroke-width="2"/>
  <text x="145" y="124" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D9</text>

  <line x1="150" y1="180" x2="170" y2="180" stroke="#333" stroke-width="2"/>
  <text x="145" y="184" text-anchor="end" fill="#333" font-size="10" font-family="Arial">GND</text>

  <line x1="150" y1="280" x2="170" y2="280" stroke="#333" stroke-width="2"/>
  <text x="145" y="284" text-anchor="end" fill="#333" font-size="10" font-family="Arial">D2</text>

  <line x1="150" y1="320" x2="170" y2="320" stroke="#333" stroke-width="2"/>
  <text x="145" y="324" text-anchor="end" fill="#333" font-size="10" font-family="Arial">GND</text>

  <!-- ══════ RAIL GND ══════ -->
  <line x1="170" y1="180" x2="170" y2="360" stroke="#333" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="170" y1="320" x2="170" y2="360" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="360" x2="520" y2="360" stroke="#333" stroke-width="2"/>
  <!-- symbole GND -->
  <line x1="340" y1="360" x2="340" y2="375" stroke="#333" stroke-width="2"/>
  <line x1="328" y1="375" x2="352" y2="375" stroke="#333" stroke-width="2"/>
  <line x1="332" y1="381" x2="348" y2="381" stroke="#333" stroke-width="1.5"/>
  <line x1="336" y1="387" x2="344" y2="387" stroke="#333" stroke-width="1"/>
  <text x="340" y="400" text-anchor="middle" fill="#333" font-size="10" font-family="Arial">GND</text>

  <!-- ══════ BUZZER ══════ -->
  <!-- fil D9 → buzzer + -->
  <line x1="170" y1="120" x2="390" y2="120" stroke="#333" stroke-width="2"/>
  <text x="280" y="112" text-anchor="middle" fill="#333" font-size="9" font-family="Arial">fil rouge (+)</text>

  <!-- fil GND → buzzer − -->
  <line x1="520" y1="360" x2="520" y2="210" stroke="#333" stroke-width="2"/>
  <text x="535" y="290" fill="#333" font-size="9" font-family="Arial">fil</text>
  <text x="535" y="302" fill="#333" font-size="9" font-family="Arial">noir</text>
  <text x="535" y="314" fill="#333" font-size="9" font-family="Arial">(−)</text>

  <!-- symbole buzzer cercle -->
  <circle cx="455" cy="165" r="45" fill="none" stroke="#333" stroke-width="2"/>
  <!-- barres internes piezo -->
  <line x1="438" y1="153" x2="472" y2="153" stroke="#333" stroke-width="2"/>
  <line x1="438" y1="163" x2="472" y2="163" stroke="#333" stroke-width="2"/>
  <line x1="438" y1="173" x2="472" y2="173" stroke="#333" stroke-width="2"/>
  <!-- ondes -->
  <path d="M480 150 Q492 165 480 180" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M487 144 Q503 165 487 186" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- fil + buzzer -->
  <line x1="390" y1="120" x2="390" y2="165" stroke="#333" stroke-width="2"/>
  <line x1="390" y1="165" x2="410" y2="165" stroke="#333" stroke-width="2"/>
  <text x="400" y="140" fill="#333" font-size="11" font-family="Arial" font-weight="bold">+</text>
  <!-- fil − buzzer -->
  <line x1="500" y1="165" x2="520" y2="165" stroke="#333" stroke-width="2"/>
  <line x1="520" y1="165" x2="520" y2="210" stroke="#333" stroke-width="2"/>
  <text x="510" y="148" fill="#333" font-size="11" font-family="Arial" font-weight="bold">−</text>
  <!-- label -->
  <text x="455" y="225" text-anchor="middle" fill="#333" font-size="10" font-family="Arial" font-weight="bold">BUZZER</text>
  <text x="455" y="238" text-anchor="middle" fill="#555" font-size="9" font-family="Arial">TMB12A05</text>

  <!-- ══════ BOUTON ══════ -->
  <!-- fil D2 → bouton -->
  <line x1="170" y1="280" x2="320" y2="280" stroke="#333" stroke-width="2"/>
  <text x="245" y="272" text-anchor="middle" fill="#333" font-size="9" font-family="Arial">fil (D2)</text>

  <!-- symbole bouton NO -->
  <!-- borne gauche -->
  <circle cx="320" cy="280" r="3.5" fill="none" stroke="#333" stroke-width="2"/>
  <!-- levier ouvert -->
  <line x1="323" y1="278" x2="365" y2="264" stroke="#333" stroke-width="2"/>
  <!-- borne droite -->
  <circle cx="368" cy="280" r="3.5" fill="none" stroke="#333" stroke-width="2"/>
  <!-- fil bouton → GND -->
  <line x1="371" y1="280" x2="430" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="430" y1="280" x2="430" y2="360" stroke="#333" stroke-width="2"/>
  <circle cx="430" cy="360" r="4" fill="#333"/>
  <!-- label -->
  <text x="344" y="300" text-anchor="middle" fill="#333" font-size="10" font-family="Arial" font-weight="bold">BT0</text>
  <text x="344" y="313" text-anchor="middle" fill="#555" font-size="9" font-family="Arial">D2 · INPUT_PULLUP</text>

  <!-- nœuds -->
  <circle cx="170" cy="360" r="4" fill="#333"/>
  <circle cx="520" cy="360" r="4" fill="#333"/>

</svg>
</body>
</html>
